  # Terraform Plan Step (Now using dynamically set tfVarFilePath)
  - task: TerraformCLI@1
    displayName: 'Terraform Plan'
    inputs:
      command: plan
      workingDirectory: ${{ parameters.terraformWorkingDirectory }}
      environmentServiceName: ${{ parameters.azureServiceConnection }}
      publishPlanResults: 'tf_plan'
      commandOptions: |
        --var-file ${{ parameters.terraformWorkingDirectory }}/vars/${{ parameters.environment }}.tfvars 
        -input=false 
        -out=$(System.DefaultWorkingDirectory)/out.tfplan

  - task: PublishPipelineArtifact@1
    displayName: 'Publish Terraform Plan'
    condition: eq(variables.runPublishPlan,True)
    inputs:
      targetPath: '$(System.DefaultWorkingDirectory)/out.tfplan'
      publishLocation: pipeline
      artifact: terraform_plan