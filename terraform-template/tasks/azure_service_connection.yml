# ✅ Remove Azure CLI upgrade from pipeline
# Ensure agent image or container already has latest CLI

- task: AzureCLI@2
  displayName: 'Obtain Service Connection credentials'
  inputs:
    azureSubscription: ${{ parameters.azureServiceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    addSpnToEnvironment: true
    inlineScript: |
      echo "Fetching Service Principal and Tenant ID..."

      servicePrincipalId=$(az ad sp show --id $AZURE_CLIENT_ID --query 'id' -o tsv)
      tenantId=$(az account show --query 'tenantId' -o tsv)
      subscriptionId=$(az account show --query 'id' -o tsv)

      echo "##vso[task.setvariable variable=azureClientId;issecret=true]$servicePrincipalId"
      echo "##vso[task.setvariable variable=azureClientSecret;issecret=true]$AZURE_CLIENT_SECRET"
      echo "##vso[task.setvariable variable=azureSubscriptionId;issecret=true]$subscriptionId"
      echo "##vso[task.setvariable variable=azureTenantId;issecret=true]$tenantId"